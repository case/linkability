[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "linkability"
version = "0.1.0"
description = "Measures how well popular tech platforms auto-link IANA top-level domains"
requires-python = ">=3.11"
dependencies = ["idna>=3.6"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[project.scripts]
linkability = "linkability.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
